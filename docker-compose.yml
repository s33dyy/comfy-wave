version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: comfywave-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: comfywave
    ports:
      - "5432:5432"
    volumes:
      - comfywave-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  comfywave-pgdata:
